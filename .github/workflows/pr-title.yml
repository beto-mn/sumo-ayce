# PR Title — validate that every pull request title follows the same
# convention as commit messages (see .husky/commit-msg). This matters
# because the repo Settings configure squash-merge to use the PR title
# as the commit subject — so a valid title becomes a valid commit
# automatically with no manual editing on the merge button.
#
# Format:  <emoji> <type>(<scope>): <description>
#          (gitmoji optional but recommended; same mapping as
#           .husky/commit-msg)
#
# Triggered on every PR open / edit / reopen so the check refreshes
# when the maintainer renames the PR.

name: PR title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PR title against commit-msg convention
    runs-on: ubuntu-latest
    steps:
      - name: Validate
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -e
          TYPES="feat|fix|chore|docs|refactor|test|ci|build|perf|style|revert|merge|release"

          expected_emoji() {
            case "$1" in
              feat)     echo "✨" ;;
              fix)      echo "🐛" ;;
              chore)    echo "🔧" ;;
              docs)     echo "📝" ;;
              refactor) echo "♻️" ;;
              test)     echo "✅" ;;
              ci)       echo "👷" ;;
              build)    echo "🏗️" ;;
              perf)     echo "⚡️" ;;
              style)    echo "💄" ;;
              revert)   echo "⏪" ;;
              merge)    echo "🔀" ;;
              release)  echo "🔖" ;;
              *)        echo "" ;;
            esac
          }

          print_help() {
            echo ""
            echo "  Format (with gitmoji):     <emoji> <type>(<scope>): <description>"
            echo "  Format (without gitmoji):  <type>(<scope>): <description>"
            echo ""
            echo "  Types and gitmojis:"
            echo "    ✨  feat       → new feature"
            echo "    🐛  fix        → bug fix"
            echo "    🔧  chore      → maintenance"
            echo "    📝  docs       → documentation"
            echo "    ♻️   refactor   → refactoring"
            echo "    ✅  test       → tests"
            echo "    👷  ci         → CI/CD changes"
            echo "    🏗️   build      → build system or dependencies"
            echo "    ⚡️  perf       → performance improvement"
            echo "    💄  style      → formatting, no logic change"
            echo "    ⏪  revert     → revert a previous commit"
            echo "    🔀  merge      → branch merge"
            echo "    🔖  release    → version release"
            echo ""
            echo "  Examples:"
            echo "    ✨ feat(homepage): add hero section"
            echo "    🐛 fix(api): handle missing phone in reservations"
            echo "    🔖 release: v0.1.2"
            echo ""
          }

          FIRST_WORD=$(echo "$TITLE" | awk '{print $1}')
          REST=$(echo "$TITLE" | cut -d' ' -f2-)

          # Title with gitmoji prefix
          if echo "$REST" | grep -qE "^($TYPES)(\(.+\))?: .+"; then
            EMOJI="$FIRST_WORD"
            TYPE=$(echo "$REST" | grep -oE "^($TYPES)")
            EXPECTED=$(expected_emoji "$TYPE")

            if [ "$EMOJI" = "$EXPECTED" ]; then
              echo "✅ PR title is valid"
              exit 0
            fi

            echo ""
            echo "❌ Gitmoji mismatch for type '$TYPE'"
            echo "   Title:        $TITLE"
            echo "   Expected:     $EXPECTED"
            echo "   You used:     $EMOJI"
            print_help
            exit 1
          fi

          # Title without gitmoji (still accepted, mirrors commit-msg behavior)
          if echo "$TITLE" | grep -qE "^($TYPES)(\(.+\))?: .+"; then
            echo "✅ PR title is valid (no gitmoji)"
            exit 0
          fi

          echo ""
          echo "❌ Invalid PR title: '$TITLE'"
          print_help
          exit 1
