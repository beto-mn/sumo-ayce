# Continuous Integration — cloud formalization of ./init.sh.
# Runs on every pull request against any base branch. Reports the same five
# checks the contributor sees locally: lint, typecheck, test, build, storybook.
# Contract: specs/009-ci-cd-github-actions/contracts/workflows.md §C1.

name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (lint + typecheck + test + build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome lint + format check
        run: pnpm check

      - name: Type-check (vue-tsc)
        run: pnpm typecheck

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Application build (Nuxt)
        run: pnpm build

  storybook:
    name: Storybook build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm storybook:build
